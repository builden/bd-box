<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aivis Next</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #7c3aed;
        --accent-strong: #6d28d9;
        --border: rgba(255, 255, 255, 0.08);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(124, 58, 237, 0.28), transparent 42%),
          linear-gradient(180deg, #10131a 0%, #0b0d12 100%);
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .card {
        background: rgba(23, 26, 33, 0.92);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
        margin: 0 0 10px;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: var(--muted);
      }

      .section {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .status {
        margin-top: 16px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .status strong {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
      }

      .hint {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Aivis Next</h1>
        <p>当前版本只保留站点级控制，默认不注入。</p>

        <div class="section">
          <div class="status" id="status">
            <strong id="status-title">当前站点控制</strong>
            <p id="status-text">请在浏览器工具栏点击 Aivis Next 图标，在 popup 中启用当前站点。</p>
          </div>

          <div class="hint">
            <strong id="note-title">启动方式</strong>
            <p id="note-text">打开普通网页后，通过 popup 开启或关闭当前 host 的 Aivis Next 注入。</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./options.js"></script>
  </body>
</html>
