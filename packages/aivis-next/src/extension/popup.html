<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aivis Next</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #7c3aed;
        --accent-strong: #6d28d9;
        --border: rgba(255, 255, 255, 0.08);
      }

      body {
        margin: 0;
        width: 320px;
        background:
          radial-gradient(circle at top right, rgba(124, 58, 237, 0.28), transparent 42%),
          linear-gradient(180deg, #10131a 0%, #0b0d12 100%);
        color: var(--text);
      }

      .wrap {
        padding: 16px;
      }

      .card {
        background: rgba(23, 26, 33, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        font-size: 16px;
        line-height: 1.2;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .status strong {
        display: block;
        font-size: 14px;
        margin-bottom: 4px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease,
          background-color 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      .primary {
        flex: 1;
        color: white;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      }

      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .dev {
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .dev strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Aivis Next</h1>
        <p>控制网页注入的工具栏和标注层。</p>

        <div class="status" id="status">
          <strong id="status-title">加载中</strong>
          <p id="status-text">正在读取扩展状态。</p>
        </div>

        <div class="actions">
          <button class="primary" id="toggle">切换状态</button>
          <button class="secondary" id="options">设置</button>
          <button class="secondary" id="reload">刷新页面</button>
        </div>

        <div class="hint">快捷键: Cmd/Ctrl + Shift + F 展开或收起工具栏</div>

        <div class="dev">
          <strong id="dev-title">开发更新</strong>
          <p id="dev-text">正在读取 watch 构建状态。</p>
        </div>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
